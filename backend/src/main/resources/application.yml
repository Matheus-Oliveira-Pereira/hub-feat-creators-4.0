spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hub_feat_creators}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
      org.hibernate.envers:
        audit_table_suffix: _AUD
        revision_field_name: REV
        revision_type_field_name: REVTYPE
  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:aHViLWZlYXQtY3JlYXRvcnMtc2VjcmV0LWtleS1kZXZlLXNlci1hbHRlcmFkYS1lbS1wcm9kdWNhby0yNTY=}
  expiration: 86400000

server:
  port: 8080
